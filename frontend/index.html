<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeTrade - Auth</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .toggle { margin-top: 15px; color: #007bff; cursor: pointer; font-size: 0.9em; }
        #message { margin-top: 15px; font-weight: bold; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="form-title">Login</h2>
    <form id="auth-form">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" id="submit-btn">Login</button>
    </form>
    <p class="toggle" id="toggle-form">Need an account? Register here.</p>
    <div id="message"></div>
</div>

<script>
    let isLogin = true;
    const formTitle = document.getElementById('form-title');
    const submitBtn = document.getElementById('submit-btn');
    const toggleForm = document.getElementById('toggle-form');
    const authForm = document.getElementById('auth-form');
    const messageDiv = document.getElementById('message');

    // Toggle between Login and Register
    toggleForm.addEventListener('click', () => {
        isLogin = !isLogin;
        formTitle.innerText = isLogin ? 'Login' : 'Register';
        submitBtn.innerText = isLogin ? 'Login' : 'Register';
        toggleForm.innerText = isLogin ? 'Need an account? Register here.' : 'Already have an account? Login here.';
        messageDiv.innerText = '';
    });

    // Handle Form Submission
    authForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const endpoint = isLogin ? '/api/v1/login' : '/api/v1/register';

       try {
            const response = await fetch(`http://localhost:8080${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            // NEW: Parse as text first to avoid the JSON crash
            const textResponse = await response.text();
            let data;
            try {
                data = JSON.parse(textResponse);
            } catch (err) {
                // If it is not valid JSON, display the plain text from the Go server
                if (!response.ok) throw new Error(textResponse);
                throw new Error("Invalid response from server");
            }

            if (!response.ok) {
                throw new Error(data.message || 'Authentication failed');
            }

            if (isLogin) {
                // Save JWT and redirect to dashboard
                localStorage.setItem('token', data.token);
                window.location.href = 'dashboard.html';
            } else {
                showMessage('Registration successful! Please login.', 'success');
                toggleForm.click(); // Switch back to login view
            }
        } catch (error) {
            showMessage(error.message, 'error');
        }
    });

    function showMessage(text, type) {
        messageDiv.innerText = text;
        messageDiv.className = type;
    }

    // Redirect if already logged in
    if (localStorage.getItem('token')) {
        window.location.href = 'dashboard.html';
    }
</script>

</body>
</html>
